name: Rust - Continuous Integration

on:
  push:
    branches: [main, dev, stable]
  pull_request:
    branches: [main, dev, stable]

# disable running jobs on earlier commits
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # Pin nightly so that it does not invalidate GitHub Actions cache too frequently.
  RUST_NIGHTLY_VERSION: nightly-2025-03-30

jobs:
  check:
    name: Build
    runs-on: [self-hosted, nixos]
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown, x86_64-unknown-none
      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Build (default features)
        run: cargo build --workspace --locked --verbose
      - name: Build (all features)
        run: cargo build --workspace --locked --all-features --verbose
      - name: Build (no_std)
        run: >-
            cargo build
            --package wasmi
            --package wasmi_c_api_impl
            --locked
            --lib
            --no-default-features
            --target x86_64-unknown-none
            --verbose
      - name: Build (no_std + hash-collections)
        run: >-
            cargo build
            --package wasmi
            --locked
            --lib
            --no-default-features
            --features hash-collections
            --target x86_64-unknown-none
            --verbose
      - name: Build (no_std + simd)
        run: >-
            cargo build
            --package wasmi
            --locked
            --lib
            --no-default-features
            --features simd
            --target x86_64-unknown-none
            --verbose
      - name: Build (no_std + wasm32)
        run: >-
            cargo build
            --package wasmi
            --package wasmi_c_api_impl
            --locked
            --lib
            --no-default-features
            --target wasm32-unknown-unknown
            --verbose
      - name: Build (CMake)
        run: |
            cmake --version
            cmake -S crates/c_api -B target/c_api --install-prefix "$(pwd)/artifacts"
            cmake --build target/c_api --target install

  test-asan:
    name: Test (Address Sanitizer)
    runs-on: [self-hosted, nixos]
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_NIGHTLY_VERSION }}
          components: rust-src
      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Show Rust Toolchain
        run: rustup show
      - name: "Add Rust Component: `rust-src`"
        run: rustup component add rust-src --toolchain nightly-x86_64-unknown-linux-gnu
      - name: Build Tests
        env:
          RUSTFLAGS: "-C debug-assertions -Zsanitizer=address"
        run: cargo build --tests --workspace --locked -Zbuild-std --target x86_64-unknown-linux-gnu --verbose
      - name: Test
        env:
          RUSTFLAGS: "-C debug-assertions -Zsanitizer=address"
        run: cargo test --workspace --locked --tests -Zbuild-std --target x86_64-unknown-linux-gnu

  min-version:
    name: Check mininum supported Rust version
    runs-on: [self-hosted, nixos]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.83.0
      - uses: Swatinem/rust-cache@v2
      - run: >-
          cargo check
          --workspace
          --exclude wasmi_fuzz
          --exclude fuzz

  test:
    name: Test
    strategy:
      matrix:
        include:
          - os: linux
            runner: [self-hosted, nixos]
          - os: windows
            runner: [self-hosted, Windows, X64, nixos-equivalent]
          - os: macos
            runner: [self-hosted, aarch64-darwin]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Build (default features)
        env:
          RUSTFLAGS: "-C debug-assertions"
        run: cargo build --tests --workspace --locked --verbose
      - name: Test (default features)
        env:
          RUSTFLAGS: "-C debug-assertions"
        run: cargo test --workspace --locked
      - name: Build (all features)
        env:
          RUSTFLAGS: "-C debug-assertions"
        run: cargo build --tests --workspace --locked --all-features --verbose
      - name: Test (all features)
        env:
          RUSTFLAGS: "-C debug-assertions"
        run: cargo test --workspace --locked --all-features

  fmt:
    name: Formatting
    runs-on: [self-hosted, nixos]
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_NIGHTLY_VERSION }}
          components: rustfmt
      - name: Foramtting
        run: cargo fmt --all -- --check
      - name: Formatting (fuzz)
        run: pushd fuzz && cargo fmt --all -- --check && popd
      - name: Format (CMake)
        run: |
            cmake --version
            cmake -S crates/c_api -B target/c_api --install-prefix "$(pwd)/artifacts"
            cmake --build target/c_api --target check-format

  doc:
    name: Documentation
    runs-on: [self-hosted, nixos]
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-docs, rust-src
      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Check Docs
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --locked --all-features --no-deps --document-private-items
      - name: Install Doxygen
        run: |
            tar --version
            curl -L https://sourceforge.net/projects/doxygen/files/rel-1.11.0/doxygen-1.11.0.linux.bin.tar.gz/download | tar xzf - -C $GITHUB_WORKSPACE
            echo "$GITHUB_WORKSPACE/doxygen-1.11.0/bin" >> $GITHUB_PATH
      - name: Configure CMake for Wasmi C-API
        run: cmake -S crates/c_api -B target/c_api
      - name: Generate Docs via Cmake and Doxygen
        run: cmake --build target/c_api --target doc

  audit:
    name: Audit
    runs-on: [self-hosted, nixos]
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: |
          # Note: We use `|| true` because cargo install returns an error
          #       if cargo-audit was already installed on the CI runner.
          cargo install cargo-audit || true
      - name: Check Audit
        # `cargo audit` picks up `audit.toml` from the workspace root
        # automatically -- see the file for the per-advisory rationale
        # (all current ignores are wasmtime 31 CVEs reachable only via
        # the developer-only differential fuzz oracle, which is not
        # part of the runtime).
        run: cargo audit

  udeps:
    name: uDeps
    runs-on: [self-hosted, nixos]
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_NIGHTLY_VERSION }}
      - name: Install cargo-udeps
        # Prebuilt binary -- the latest cargo-udeps source pulls in
        # transitive crates that need rust 1.91+ to compile, but this
        # job runs on the pinned 1.88 nightly to keep the GHA cache
        # stable.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-udeps
      - name: Check uDeps
        run: cargo udeps --all-targets

  fuzz:
    name: Fuzz
    runs-on: [self-hosted, nixos]
    strategy:
      matrix:
        fuzz_target: ['translate', 'execute', 'differential']
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_NIGHTLY_VERSION }}
          # cargo fuzz builds for x86_64-unknown-linux-musl so that
          # AddressSanitizer can use a dynamically-linked libc
          # (sanitizer is incompatible with statically linked libc
          # if -crt-static is set).  The target's std must be on
          # disk for the build to find `core`.
          targets: x86_64-unknown-linux-musl

      - name: Install musl C/C++ toolchain
        # libfuzzer-sys's build.rs uses cc-rs to compile
        # libfuzzer's C++ runtime, which looks up
        # x86_64-linux-musl-g++.  The musl-tools package only
        # ships musl-gcc; install the multi-arch cross compiler
        # so cc-rs can resolve the musl C++ frontend too.
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev g++-x86-64-linux-gnu
          # Provide musl-g++ as a symlink to the host g++ -- the
          # musl libc target only needs a C++ frontend that
          # understands the musl-gcc include / link paths; the
          # libfuzzer-sys cc-rs build will pass -target via the
          # rustc-injected CFLAGS.
          if ! command -v x86_64-linux-musl-g++ >/dev/null 2>&1; then
            sudo ln -sf "$(command -v musl-gcc)" /usr/local/bin/x86_64-linux-musl-gcc
            sudo ln -sf "$(command -v g++)" /usr/local/bin/x86_64-linux-musl-g++
          fi

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-directories: |
            ${{ github.workspace }}/fuzz/corpus/${{ matrix.fuzz_target }}
            ${{ github.workspace }}/target
          prefix-key: fuzz-${{ matrix.fuzz_target }}
      - name: Install `cargo-fuzz`
        # Prebuilt binary -- the latest cargo-fuzz source pulls in
        # zmij, which uses `core::hint::select_unpredictable`
        # (stabilised in 1.91), but this job runs on the 1.88 nightly.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Set Fuzzing Features
        run: |
          FEATURES=""
          if [ "${{ matrix.fuzz_target }}" == "differential" ]; then
            FEATURES="--features differential"
          fi
          echo "FEATURES=$FEATURES" >> $GITHUB_ENV
          # AddressSanitizer is incompatible with statically linked
          # libc; the x86_64-unknown-linux-musl target defaults to
          # ``-C target-feature=+crt-static``.  Override per-build via
          # RUSTFLAGS so cargo-fuzz produces a sanitizer-compatible
          # binary.  Also link libm explicitly: the ASan runtime
          # archive (librustc-nightly_rt.asan.a) references
          # `signgam@@GLIBC_2.2.5` from libm but the default link
          # line for the musl target uses `-nodefaultlibs` so libm
          # isn't pulled in transitively.
          echo "RUSTFLAGS=-C target-feature=-crt-static -C link-arg=-lm" >> $GITHUB_ENV
      - name: Check Fuzzing Target
        run: cargo fuzz check ${{ matrix.fuzz_target }} $FEATURES
      - name: Build Fuzzing Target
        run: cargo fuzz build ${{ matrix.fuzz_target }} $FEATURES
      - name: Run Fuzzing Target
        # - Use 4 jobs since GitHub hosted runners provide 4 CPUs.
        # - Always enable debug-assertions for all modes to catch more bugs.
        # - Run fuzzing for 120s (2 minutes) in total.
        run: >-
          cargo fuzz run ${{ matrix.fuzz_target }}
          --jobs 4
          --verbose
          --debug-assertions
          $FEATURES
          --
          -max_total_time=120

  miri:
    name: Miri
    runs-on: [self-hosted, nixos]
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_NIGHTLY_VERSION }}
          components: miri
          targets: x86_64-unknown-linux-gnu
      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-nextest
        # Use prebuilt binary so the host rustc version does not have to
        # satisfy cargo-nextest's MSRV (currently 1.91+, while the pinned
        # nightly here is 1.88 to keep the GHA cache stable).
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Miri (setup)
        run: cargo miri setup --target x86_64-unknown-linux-gnu --lib --workspace --locked
      - name: Miri (--lib)
        run: cargo miri nextest run --target x86_64-unknown-linux-gnu --lib --workspace --locked
      - name: Miri (--doc)
        run: cargo miri test --target x86_64-unknown-linux-gnu --doc --workspace --locked

  miri-spec:
    name: Miri (spec)
    runs-on: [self-hosted, nixos]
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_NIGHTLY_VERSION }}
          components: miri
          targets: x86_64-unknown-linux-gnu
      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Miri (setup)
        run: cargo miri setup --target x86_64-unknown-linux-gnu --locked
      - name: Miri - Wasm Spec Testsuite (store)
        # We just run the `store.wast` test since running the entire Wasm spec testsuite
        # simply takes too long to do on every pull request commit. There exists an entire
        # CRON job that runs the entire Wasm spec testsuite using miri every night.
        run: cargo miri nextest run --target x86_64-unknown-linux-gnu ::wasm_store --locked

  clippy:
    name: Clippy
    runs-on: [self-hosted, nixos]
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_NIGHTLY_VERSION }}
          components: clippy
      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Clippy (default features)
        run: cargo clippy --workspace --locked -- -D warnings
      - name: Clippy (all features)
        run: cargo clippy --workspace --locked --all-features -- -D warnings
      - name: Clippy (no_std)
        run: cargo clippy --workspace --locked --no-default-features -- -D warnings
      - name: Clippy (tests)
        run: cargo clippy --workspace --locked --tests -- -D warnings
      - name: Clippy (benches)
        run: cargo clippy --workspace --locked --benches -- -D warnings
      - name: Clippy (fuzz)
        run: pushd fuzz && cargo clippy -- -D warnings && popd

  coverage:
    name: Coverage
    runs-on: [self-hosted, nixos]
    container:
      image: xd009642/tarpaulin:develop-nightly
      options: --security-opt seccomp=unconfined
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          submodules: true
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_NIGHTLY_VERSION }}
      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Generate code coverage
        run: |
          cargo tarpaulin --verbose --all-features --workspace --timeout 120 --out xml
      - name: Upload to codecov.io
        uses: codecov/codecov-action@v5.4.0
        with:
          token: ${{secrets.CODECOV_TOKEN}}
          # Codecov's release-key GPG verification is currently
          # failing for the uploader binary ("Can't check signature:
          # No public key"); the coverage data itself is fine.
          # Don't block CI on the verification glitch.
          fail_ci_if_error: false
      - name: Archive code coverage results
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: cobertura.xml
